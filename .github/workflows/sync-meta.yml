name: Sync Meta Ads Resilient Weekly Archive

on:
  workflow_dispatch:
    inputs:
      backfill_weeks:
        description: "Optional historical lookback in weeks, for example 52 or 104"
        required: false
        type: string
      refresh_weeks:
        description: "Recent weeks to refresh on each run (default 6)"
        required: false
        type: string
      max_retries:
        description: "Retries per Meta request (default 5)"
        required: false
        type: string
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  sync-meta-ads:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull Meta Ads data one week at a time
        id: meta_sync
        continue-on-error: true
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_GRAPH_VERSION: ${{ secrets.META_GRAPH_VERSION }}
          META_SYNC_WEEKS: ${{ github.event.inputs.refresh_weeks || secrets.META_SYNC_WEEKS }}
          META_INITIAL_BACKFILL_WEEKS: ${{ secrets.META_INITIAL_BACKFILL_WEEKS }}
          META_FORCE_BACKFILL_WEEKS: ${{ github.event.inputs.backfill_weeks }}
          META_MAX_RETRIES: ${{ github.event.inputs.max_retries || secrets.META_MAX_RETRIES }}
          META_RETRY_BASE_MS: ${{ secrets.META_RETRY_BASE_MS }}
          META_REQUEST_DELAY_MS: ${{ secrets.META_REQUEST_DELAY_MS }}
          META_REQUEST_TIMEOUT_MS: ${{ secrets.META_REQUEST_TIMEOUT_MS }}
        run: node scripts/sync-meta-ads.mjs

      - name: Commit archive and debug output
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update resilient Meta Ads weekly archive"
          file_pattern: dashboard-data.json sync-debug.json

      - name: Mark workflow incomplete when some weeks failed
        if: steps.meta_sync.outcome == 'failure'
        run: |
          echo "One or more Meta periods remain incomplete. Successful weeks were committed. Rerun the workflow to resume failed weeks."
          exit 1
