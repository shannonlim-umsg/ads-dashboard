name: Sync Ads Data (Meta + TikTok)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  sync-ads-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull Meta and TikTok Ads data
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_ADVERTISER_ID: ${{ secrets.TIKTOK_ADVERTISER_ID }}
        run: node scripts/sync-ads-data.mjs

      - name: Commit updated dashboard data and debug log
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update ads dashboard data"
          file_pattern: dashboard-data.json sync-debug.json
